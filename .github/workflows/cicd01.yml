name: github action 테스트 1번.
on:
  push:
    branches:
      - main

jobs:
  My-Deploy-Job:
    runs-on: ubuntu-latest

    steps:
      - name: Hello World 출력
        run: echo "Hello World"

      - name: 여러개 명령어 추가하기
        run: |
          echo "Good"
          echo "Morning"

      - name: Github Actions 내장 변수 사용.
        run: |
          echo $GITHUB_SHA
          echo $GITHUB_REPOSITORY
          echo "3. 워크플로우 실행한 놈 : $GITHUB_ACTOR"
          echo "4. 현재 실행중인 브랜치 : $GITHUB_REF_NAME"
          echo "5. 이 워크플로우 실행 번호 : $GITHUB_RUN_NUMBER"
          echo "6. 워크플로우 발생 이벤트 : $GITHUB_EVENT_NAME"
          echo "7. 현재 액션이 돌아가는 os : $GITHUB_OS"
          echo "8. 가상환경 기본작업 경로 : $GITHUB_WORKSPACE"

      - name: secret 변수 사용
        run : |
          echo ${{secrets.MY_AGE}}
          echo ${{secrets.MY_PAY}}